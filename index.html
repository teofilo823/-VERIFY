<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gateway de Verificação Segura</title>
    <style>
        body { background-color: #121318; color: white; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .btn { background-color: #1a73e8; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn:hover { background-color: #155cb4; }
        .escondido { display: none; }
    </style>
</head>
<body>
    <h1>⚡ Verificação Anti-Alt</h1>
    <p id="instrucao">Clique no botão abaixo para autenticar sua conta e verificar seu dispositivo.</p>
    <br>
    
    <a id="btn-login" class="btn" href="https://discord.com/oauth2/authorize?client_id=837047332654153772&response_type=code&redirect_uri=https%3A%2F%2Fteofilo823.github.io%2F-VERIFY%2F&scope=identify">Verificar Identidade com o Discord</a>
    
    <h2 id="status" class="escondido">Analisando hardware e IP...</h2>

    <script>
        // Captura o token do Discord vindo da URL após o login
        const fragment = new URLSearchParams(window.location.hash.slice(1));
        const accessToken = fragment.get('access_token');

        if (accessToken) {
            // Esconde o botão e mostra que está processando
            document.getElementById('btn-login').classList.add('escondido');
            document.getElementById('instrucao').classList.add('escondido');
            const statusTxt = document.getElementById('status');
            statusTxt.classList.remove('escondido');

            // 1. Pega os dados do usuário no Discord usando o Token obtido
            fetch('https://discord.com/api/users/@me', {
                headers: { authorization: `Bearer ${accessToken}` }
            })
            .then(res => res.json())
            .then(user => {
                // 2. Envia o ID do usuário e o IP para a API do seu bot na Discloud
                // Pegamos o IP usando um serviço público gratuito (api.ipify.org)
                fetch('https://api.ipify.org?format=json')
                .then(res => res.json())
                .then(ipData => {
                    
                    // Envia os dados estruturados para o Webhook do seu canal de logs
                    const dadosWebhook = {
                        embeds: [{
                            title: "Análise Forense de Verificação",
                            fields: [
                                { name: "ID do Utilizador", value: user.id, inline: true },
                                { name: "IP Detetado", value: ipData.ip, inline: true },
                                { name: "Ação", value: "REQUISITAR_VALIDACAO", inline: false }
                            ]
                        }]
                    };

                    fetch("https://discord.com/api/webhooks/1510182678819770368/AqmsEf4QpNvv3evB4vJPtblbd9gYcVhUKgEECThMe9HQBJmOziedLRkAB1F-dJSu1qR5", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(dadosWebhook)
                    }).then(() => {
                        statusTxt.innerHTML = "<h1>✅ Verificação Concluída! Pode voltar ao Discord.</h1>";
                    });
                });
            })
            .catch(err => {
                statusTxt.innerHTML = "<h1>❌ Erro ao processar a verificação.</h1>";
            });
        }
    </script>
</body>
</html>
